apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: redis
  namespace: magento

spec:
  serviceName: redis

  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis

          image: redis:7-alpine

          command:
            - redis-server

          args:
            - "--appendonly"
            - "yes"

          ports:
            - containerPort: 6379

          volumeMounts:
            - name: redis-storage
              mountPath: /data

          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping

            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            tcpSocket:
              port: 6379

            initialDelaySeconds: 20
            periodSeconds: 10

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"

            limits:
              memory: "256Mi"
              cpu: "500m"

  volumeClaimTemplates:
    - metadata:
        name: redis-storage

      spec:
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 5Gi